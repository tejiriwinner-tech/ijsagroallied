<!DOCTYPE html>
<html>

<head>
    <title>API Connection Test</title>
</head>

<body>
    <h1>API Connection Test</h1>
    <button onclick="testAPI()">Test API Connection</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                const response = await fetch('http://localhost/ijsagroallied/backend/api/api/auth/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@ijs.com',
                        password: 'admin123'
                    })
                });

                console.log('Response status:', response.status);
                const text = await response.text();
                console.log('Response text:', text);

                try {
                    const data = JSON.parse(text);
                    resultDiv.innerHTML = `
                        <h3>Success! API is working</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } catch (e) {
                    resultDiv.innerHTML = `
                        <h3>Error: API returned HTML instead of JSON</h3>
                        <p>This usually means XAMPP is not running or the path is wrong.</p>
                        <details>
                            <summary>Raw Response</summary>
                            <pre>${text}</pre>
                        </details>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>Network Error</h3>
                    <p>${error.message}</p>
                    <p>Make sure XAMPP is running and the project is in htdocs/ijsagroallied/</p>
                `;
            }
        }
    </script>
</body>

</html>
