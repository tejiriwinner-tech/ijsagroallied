<!DOCTYPE html>
<html>

<head>
    <title>Login Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>

<body>
    <h1>Login Test</h1>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" value="admin@ijs.com">
    </div>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" value="admin123">
    </div>

    <button onclick="testLogin()">Test Login</button>

    <div id="result"></div>

    <script>
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            resultDiv.textContent = 'Testing login...';
            resultDiv.className = '';

            try {
                const response = await fetch('http://localhost/ijsagroallied/backend/api/api/auth/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.textContent = '✅ LOGIN SUCCESSFUL!\n\n' + JSON.stringify(data, null, 2);

                    // Store in localStorage
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    localStorage.setItem('auth_token', data.data.token);

                    console.log('Stored in localStorage:', {
                        user: data.data.user,
                        token: data.data.token
                    });
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = '❌ LOGIN FAILED\n\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = '❌ ERROR\n\n' + error.message;
            }
        }
    </script>
</body>

</html>
